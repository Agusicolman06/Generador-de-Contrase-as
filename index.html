<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Generador de Contraseñas Seguras</h1>
        <div class="password-box">
            <input type="text" id="password" readonly>
            <button id="copyBtn" onclick="copiarContraseña()">Copiar</button>
        </div>
        <div id="strength-meter">
            <div id="strength-bar"></div>
            <span id="strength-text">Seguridad: Calculando...</span>
        </div>
        <div class="options">
            <label for="length">Longitud: <span id="lengthValue">12</span></label>
            <input type="range" id="length" min="6" max="20" value="12">
            <label><input type="checkbox" id="uppercase" checked> Mayúsculas</label>
            <label><input type="checkbox" id="numbers" checked> Números</label>
            <label><input type="checkbox" id="symbols" checked> Símbolos</label>
        </div>
        <button id="generateBtn" onclick="generarContraseña()">Generar Contraseña</button>
        <div id="message" class="message"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
